<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Decreto 351 - Instalaciones Eléctricas v0.4</title>
    <style>
        :root {
            --primary: #1e40af;
        }
        body { font-family: system-ui, -apple-system, sans-serif; margin:0; background:#f8fafc; color:#1e2937; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: var(--primary); color: white; padding: 2rem; text-align: center; border-radius: 0 0 12px 12px; }
        h1 { margin: 0; }
        .search { width: 100%; padding: 14px; font-size: 1.1rem; border: 2px solid #e2e8f0; border-radius: 9999px; margin: 20px 0; }
        .progress-container { background: #e2e8f0; height: 28px; border-radius: 9999px; overflow: hidden; margin: 20px 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #22c55e, #15803d); transition: width 0.4s ease; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0; }
        .tab { padding: 10px 22px; background: white; border: 2px solid #64748b; border-radius: 9999px; cursor: pointer; font-weight: 500; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .item { background: white; border-radius: 12px; padding: 18px; margin: 12px 0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .item-header { display: flex; justify-content: space-between; align-items: start; }
        .buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        button { padding: 10px 20px; border: none; border-radius: 9999px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .yes { background: #22c55e; color: white; }
        .no { background: #ef4444; color: white; }
        .na { background: #64748b; color: white; }
        .status { padding: 6px 14px; border-radius: 9999px; font-size: 0.95rem; font-weight: bold; margin-top: 8px; }
        .footer { text-align: center; padding: 30px 0; color: #64748b; font-size: 0.95rem; }
    </style>
</head>
<body>
    <header>
        <h1>Checklist Interactivo</h1>
        <h2>Decreto 351/79 - Capítulo 14<br>Instalaciones Eléctricas</h2>
    </header>

    <div class="container">
        <input type="text" id="searchInput" class="search" placeholder="🔍 Buscar por ID o descripción..." onkeyup="filterItems()">

        <div class="progress-container">
            <div id="progressBar" class="progress-bar" style="width: 0%">0%</div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="0" onclick="switchTab(0)">Todos</div>
            <div class="tab" data-tab="1" onclick="switchTab(1)">General</div>
            <div class="tab" data-tab="2" onclick="switchTab(2)">Baja Tensión (BT)</div>
            <div class="tab" data-tab="3" onclick="switchTab(3)">Media / Alta Tensión</div>
            <div class="tab" data-tab="4" onclick="switchTab(4)">Adicionales</div>
        </div>

        <div id="checklistContainer"></div>

        <div class="footer">
            <strong>Versión v0.4</strong> — Mayo 2026<br>
            <small>Los cambios se guardan automáticamente en tu navegador</small><br><br>
            <button onclick="resetChecklist()" style="background:#ef4444;color:white;padding:10px 20px;border:none;border-radius:9999px;cursor:pointer;">🔄 Resetear todo</button>
        </div>
    </div>

    <script>
        let checklist = [
            { id: "A-01", section: "General", desc: "Art. 95 - Las instalaciones y equipos eléctricos deberán cumplir con las prescripciones necesarias para evitar riesgos a personas o cosas.", status: null },
            { id: "A-02", section: "General", desc: "Art. 96 - Materiales y equipos cumplen normas técnicas (AEA u otras).", status: null },
            { id: "A-03", section: "General", desc: "Art. 97 - Proyectos y trabajos según anexos. Aprobación para >1000V.", status: null },
            { id: "G-01", section: "General", desc: "1.1.2 Tensión de seguridad: Hasta 24V en ambientes secos y húmedos.", status: null },
            { id: "G-02", section: "General", desc: "1.1.3 Procedimiento completo de Bloqueo y Consignación (5 pasos).", status: null },
            { id: "BT-01", section: "BT", desc: "2.1.1 Identificación y precauciones en trabajos BT.", status: null },
            { id: "BT-02", section: "BT", desc: "2.1.2 Material de seguridad específico para BT (guantes, detectores, alfombras, etc).", status: null },
            { id: "BT-03", section: "BT", desc: "2.1.3 Procedimiento completo trabajos sin tensión en BT.", status: null },
            { id: "MT-01", section: "MT", desc: "2.2.1 Autorización y preparación para trabajos en MT/AT.", status: null },
            { id: "MT-02", section: "MT", desc: "2.2.2 Procedimiento de consignación en MT/AT.", status: null },
            { id: "AD-01", section: "Adicionales", desc: "Señalización y delimitación permanente de áreas con riesgo eléctrico.", status: null },
            { id: "AD-02", section: "Adicionales", desc: "Puesta a tierra efectiva y protección diferencial.", status: null },
            { id: "AD-03", section: "Adicionales", desc: "Programas de mantenimiento y registros actualizados.", status: null }
        ];

        function loadSavedData() {
            const saved = localStorage.getItem('checklist351');
            if (saved) {
                const parsed = JSON.parse(saved);
                checklist = checklist.map((item, i) => ({
                    ...item,
                    status: parsed[i] ? parsed[i].status : null
                }));
            }
        }

        function saveData() {
            localStorage.setItem('checklist351', JSON.stringify(checklist));
        }

        function setStatus(index, newStatus) {
            checklist[index].status = newStatus;
            saveData();
            renderChecklist();
        }

        function calculateProgress() {
            const answered = checklist.filter(item => item.status !== null).length;
            return Math.round((answered / checklist.length) * 100);
        }

        function renderChecklist(filtered = checklist) {
            const container = document.getElementById('checklistContainer');
            container.innerHTML = '';

            filtered.forEach((item, index) => {
                const globalIndex = checklist.findIndex(i => i.id === item.id);

                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="item-header">
                        <div>
                            <strong>${item.id}</strong> — ${item.section}
                            <p style="margin:8px 0 0 0; color:#475569;">${item.desc}</p>
                        </div>
                    </div>
                    <div class="buttons">
                        <button class="yes" onclick="setStatus(${globalIndex}, 'Sí')">✅ Sí</button>
                        <button class="no" onclick="setStatus(${globalIndex}, 'No')">❌ No</button>
                        <button class="na" onclick="setStatus(${globalIndex}, 'N/A')">N/A</button>
                    </div>
                    <div class="status ${item.status ? (item.status==='Sí' ? 'yes' : item.status==='No' ? 'no' : 'na') : ''}">
                        ${item.status ? 'Estado: ' + item.status : 'Pendiente'}
                    </div>
                `;
                container.appendChild(div);
            });

            // Actualizar barra de progreso
            const percent = calculateProgress();
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressBar').textContent = percent + '% Cumplimiento';
        }

        function filterItems() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!term) {
                renderChecklist();
                return;
            }
            const filtered = checklist.filter(item => 
                item.id.toLowerCase().includes(term) || 
                item.desc.toLowerCase().includes(term)
            );
            renderChecklist(filtered);
        }

        function switchTab(tabIndex) {
            document.querySelectorAll('.tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === tabIndex);
            });

            let filtered = checklist;
            if (tabIndex === 1) filtered = checklist.filter(i => i.section === 'General');
            else if (tabIndex === 2) filtered = checklist.filter(i => i.section === 'BT');
            else if (tabIndex === 3) filtered = checklist.filter(i => i.section === 'MT');
            else if (tabIndex === 4) filtered = checklist.filter(i => i.section === 'Adicionales');

            renderChecklist(filtered);
        }

        function resetChecklist() {
            if (confirm('¿Estás seguro de resetear TODOS los estados?')) {
                checklist.forEach(item => item.status = null);
                localStorage.removeItem('checklist351');
                renderChecklist();
            }
        }

        // Inicializar
        loadSavedData();
        renderChecklist();
    </script>
</body>
</html>
