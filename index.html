<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Interactivo - Decreto 351 Cap.14</title>
    <style>
        body{font-family: system-ui, -apple-system, sans-serif; line-height:1.6; margin:0; background:#f0f2f5;}
        header{background:#1e3a8a; color:white; padding:2rem; text-align:center;}
        .container{max-width:1100px; margin:20px auto; padding:0 15px;}
        .tabs{display:flex; flex-wrap:wrap; gap:8px; margin:20px 0; justify-content:center;}
        .tab{padding:10px 20px; background:white; border:1px solid #1e3a8a; border-radius:9999px; cursor:pointer;}
        .tab.active{background:#1e3a8a; color:white;}
        .item{background:white; border-radius:8px; padding:15px; margin:12px 0; box-shadow:0 2px 8px rgba(0,0,0,.1);}
        .status{display:inline-block; padding:6px 12px; margin:2px; border-radius:9999px; cursor:pointer; font-size:0.9rem;}
        .yes{background:#22c55e; color:white;}
        .no{background:#ef4444; color:white;}
        .na{background:#64748b; color:white;}
        #progress {height:25px; background:#e2e8f0; border-radius:9999px; overflow:hidden; margin:20px 0;}
        #progressFill{height:100%; background:linear-gradient(to right, #22c55e, #1e40af); transition:width .4s;}
    </style>
</head>

<header>

<div class="tab" onclick="openTab(1)">General</div>
<div class="tab" onclick="openTab(2)">BT</div>
<div class="tab" onclick="openTab(3)">MT/AT</div>

</div>
<div id="content"></div>
</div>
